<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 视口设置：确保网页在安卓手机等移动设备上能正确缩放和显示[reference:7][reference:8] -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DeepSeek 智能助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f9fc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 聊天容器 - 在手机上也能有舒适的边距 */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border-radius: 0;
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .chat-container {
                height: 90vh;
                border-radius: 24px;
                margin: 20px auto;
            }
        }
        /* 聊天记录区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #ffffff;
        }
        /* 消息气泡样式 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
        }
        .user-message .message-bubble {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .message-bubble {
            background: #f0f2f5;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }
        .message-role {
            font-size: 12px;
            margin-bottom: 4px;
            margin-left: 8px;
            color: #6c757d;
        }
        /* 加载状态提示 */
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #f0f2f5;
            border-radius: 20px;
            width: fit-content;
            font-size: 14px;
            color: #6c757d;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #6c757d;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.3s; }
        .dot:nth-child(2) { animation-delay: -0.15s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        /* 底部输入区域 */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #e9ecef;
            background: white;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            border: 1px solid #dee2e6;
            border-radius: 24px;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 120px;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #0084ff;
        }
        button {
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            height: 44px;
        }
        button:active {
            background: #0066cc;
        }
        button:disabled {
            background: #b0c4de;
            cursor: not-allowed;
        }
        /* API Key 配置区域（仅在未配置时显示） */
        .config-bar {
            background: #f8f9fa;
            padding: 12px 16px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .config-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
        }
        .config-bar button {
            background: #28a745;
            padding: 8px 16px;
            height: auto;
        }
        .error-tip {
            color: #dc3545;
            font-size: 12px;
            margin-left: 8px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- API Key 配置栏（首次使用会显示） -->
    <div id="configBar" class="config-bar">
        <input type="password" id="apiKeyInput" placeholder="请输入你的 DeepSeek API Key (sk-...)" autocomplete="off">
        <button id="saveKeyBtn">保存 Key</button>
        <span id="configError" class="error-tip"></span>
    </div>

    <!-- 聊天记录展示区域 -->
    <div id="chatMessages" class="chat-messages">
        <div class="message assistant-message">
            <div class="message-role">DeepSeek</div>
            <div class="message-bubble">
                你好！我是 DeepSeek 智能助手，有什么可以帮你的吗？
            </div>
        </div>
    </div>

    <!-- 底部输入区 -->
    <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="输入你的问题..." ></textarea>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // ---------- DOM 元素绑定 ----------
    const configBar = document.getElementById('configBar');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const configErrorSpan = document.getElementById('configError');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    let currentApiKey = '';
    let isLoading = false; // 防止重复发送

    // ---------- 加载本地存储的 API Key ----------
    function loadApiKey() {
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey && savedKey.startsWith('sk-')) {
            currentApiKey = savedKey;
            configBar.classList.add('hidden');
        } else {
            // 没有有效的 Key，显示配置栏
            configBar.classList.remove('hidden');
            currentApiKey = '';
        }
    }

    // ---------- 保存 API Key ----------
    function saveApiKey() {
        let key = apiKeyInput.value.trim();
        if (!key) {
            configErrorSpan.innerText = '请输入 API Key';
            return;
        }
        if (!key.startsWith('sk-')) {
            configErrorSpan.innerText = 'API Key 格式不正确，应以 sk- 开头';
            return;
        }
        localStorage.setItem('deepseek_api_key', key);
        currentApiKey = key;
        configBar.classList.add('hidden');
        configErrorSpan.innerText = '';
        apiKeyInput.value = '';
        // 可选：显示一条保存成功的消息
        addSystemMessage('? API Key 已保存，现在可以开始对话了。');
    }

    // ---------- 添加系统消息（如提示保存成功）----------
    function addSystemMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message assistant-message';
        msgDiv.innerHTML = `<div class="message-role">DeepSeek</div><div class="message-bubble">${escapeHtml(text)}</div>`;
        chatMessagesDiv.appendChild(msgDiv);
        scrollToBottom();
    }

    // ---------- 添加用户消息 ----------
    function addUserMessage(content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-message';
        msgDiv.innerHTML = `<div class="message-role">你</div><div class="message-bubble">${escapeHtml(content)}</div>`;
        chatMessagesDiv.appendChild(msgDiv);
        scrollToBottom();
    }

    // ---------- 添加 AI 消息（普通文本）----------
    function addAssistantMessage(content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message assistant-message';
        msgDiv.innerHTML = `<div class="message-role">DeepSeek</div><div class="message-bubble">${escapeHtml(content)}</div>`;
        chatMessagesDiv.appendChild(msgDiv);
        scrollToBottom();
    }

    // ---------- 显示/隐藏加载动画 ----------
    let loadingElement = null;
    function showLoading() {
        if (loadingElement) return;
        loadingElement = document.createElement('div');
        loadingElement.className = 'message assistant-message';
        loadingElement.innerHTML = `
            <div class="message-role">DeepSeek</div>
            <div class="loading-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span style="margin-left: 6px;">正在思考中...</span>
            </div>
        `;
        chatMessagesDiv.appendChild(loadingElement);
        scrollToBottom();
    }

    function hideLoading() {
        if (loadingElement && loadingElement.parentNode) {
            loadingElement.parentNode.removeChild(loadingElement);
            loadingElement = null;
        }
    }

    // ---------- 滚动到底部 ----------
    function scrollToBottom() {
        setTimeout(() => {
            if (chatMessagesDiv) {
                chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
            }
        }, 50);
    }

    // ---------- 简单的防 XSS 转义 ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ---------- 调用 DeepSeek API （核心）----------
    async function callDeepSeekAPI(userQuestion) {
        if (!currentApiKey) {
            throw new Error('未设置 API Key，请先配置 Key');
        }

        const endpoint = 'https://api.deepseek.com/chat/completions';
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentApiKey}`
        };

        // 从聊天记录中获取上下文：简单实现只取最后几条消息作为对话历史
        // 实际生产建议管理更完整的 history 数组，这里为了简洁，仅将历史 messages 传给模型
        const historyMessages = buildMessagesFromChatHistory(userQuestion);
        
        const payload = {
            model: 'deepseek-chat',   // 使用 deepseek-chat 模型，若需使用 deepseek-reasoner 可修改[reference:9]
            messages: historyMessages,
            stream: false,           // 非流式响应，若需要逐字输出效果可改为 true（实现会更复杂）
            temperature: 0.7
        };

        const response = await fetch(endpoint, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            let errorDetail = '';
            try {
                const errData = await response.json();
                errorDetail = errData.error?.message || JSON.stringify(errData);
            } catch(e) {
                errorDetail = await response.text();
            }
            if (response.status === 401) {
                throw new Error('API Key 无效或已失效，请检查并重新保存 Key');
            } else if (response.status === 429) {
                throw new Error('请求频率过高，请稍后再试');
            } else {
                throw new Error(`API 请求失败 (${response.status}): ${errorDetail}`);
            }
        }

        const data = await response.json();
        if (!data.choices || !data.choices[0] || !data.choices[0].message) {
            throw new Error('API 返回格式异常');
        }
        const reply = data.choices[0].message.content;
        return reply;
    }

    // 从当前 DOM 聊天记录构建 messages 数组（最近10轮对话）
    function buildMessagesFromChatHistory(currentUserMessage) {
        const messages = [];
        // 系统提示，可自定义
        messages.push({
            role: 'system',
            content: '你是一个有用的智能助手，请用中文回答用户的问题，回答要简洁且信息丰富。'
        });
        
        // 获取所有 .message 元素
        const msgElements = document.querySelectorAll('.message');
        // 最多保留前 N 组对话，避免 token 过多（简单取最近 20 条消息，即 10 轮对话）
        const maxHistoryPairs = 8; 
        let startIndex = Math.max(0, msgElements.length - maxHistoryPairs * 2);
        for (let i = startIndex; i < msgElements.length; i++) {
            const el = msgElements[i];
            const roleEl = el.querySelector('.message-role');
            if (!roleEl) continue;
            const roleText = roleEl.innerText.trim();
            const bubble = el.querySelector('.message-bubble');
            if (!bubble) continue;
            const content = bubble.innerText.trim();
            if (!content) continue;
            if (roleText === '你') {
                messages.push({ role: 'user', content: content });
            } else if (roleText === 'DeepSeek') {
                messages.push({ role: 'assistant', content: content });
            }
        }
        // 最后加上当前用户新消息
        if (currentUserMessage) {
            messages.push({ role: 'user', content: currentUserMessage });
        }
        // 如果消息过长或超出上下文，可以截断，这里简单返回
        return messages;
    }

    // ---------- 发送消息主流程 ----------
    async function sendMessage() {
        if (isLoading) return;
        const question = userInput.value.trim();
        if (!question) return;
        if (!currentApiKey) {
            configErrorSpan.innerText = '请先在上方配置 API Key';
            configBar.classList.remove('hidden');
            return;
        }

        isLoading = true;
        sendBtn.disabled = true;
        userInput.disabled = true;

        // 清空输入框并调整高度
        userInput.value = '';
        userInput.style.height = 'auto';
        
        // 在界面上添加用户消息
        addUserMessage(question);
        
        // 显示加载动画
        showLoading();
        
        try {
            const reply = await callDeepSeekAPI(question);
            hideLoading();
            addAssistantMessage(reply);
        } catch (error) {
            console.error('调用 DeepSeek 出错:', error);
            hideLoading();
            let errorMsg = error.message || '未知错误';
            // 更友好的提示
            if (errorMsg.includes('API Key')) {
                errorMsg = 'API Key 无效，请检查配置';
                configBar.classList.remove('hidden');
                currentApiKey = '';
                localStorage.removeItem('deepseek_api_key');
            } else if (errorMsg.includes('fetch')) {
                errorMsg = '网络请求失败，请检查网络连接或 API 地址是否可访问';
            }
            addAssistantMessage(`? 抱歉，出错了：${errorMsg}`);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
            scrollToBottom();
        }
    }

    // ---------- 自动调整 textarea 高度 ----------
    function autoResizeTextarea() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }

    // ---------- 事件绑定 ----------
    saveKeyBtn.addEventListener('click', saveApiKey);
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    userInput.addEventListener('input', autoResizeTextarea);
    
    // 初始化
    loadApiKey();
    // 让输入框获得焦点
    userInput.focus();
</script>
</body>
</html>
